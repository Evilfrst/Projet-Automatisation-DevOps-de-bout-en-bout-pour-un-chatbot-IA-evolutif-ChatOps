apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatops-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatops
  template:
    metadata:
      labels:
        app: chatops
    spec:
      containers:
        - name: chatops
          image: <DOCKER_USERNAME>/devops-chatops:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
