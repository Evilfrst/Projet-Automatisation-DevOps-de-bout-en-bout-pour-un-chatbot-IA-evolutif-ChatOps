name: Deploy ChatOps Project

on:
  push:
    branches:
      - main

concurrency:
  group: chatops-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/ubuntu/chatops"

      - name: Configure and deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            cd /home/ubuntu/chatops

            echo "=== Création du fichier .env ==="

            cat > .env <<'EOF'
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=gpt-4o-mini
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ENVIRONMENT=production
            POSTGRES_DB=chatops
            POSTGRES_USER=chatops
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            NEXT_PUBLIC_API_URL=http://${{ secrets.HOST }}:8000
            CORS_ORIGINS=http://${{ secrets.HOST }}:3000
            BIND_ADDRESS=0.0.0.0
            BACKEND_PORT=8000
            FRONTEND_PORT=3000
            EOF

            echo "=== Vérification des variables obligatoires ==="

            if grep -q '^JWT_SECRET=$' .env; then
              echo "Erreur : le secret JWT_SECRET est vide."
              exit 1
            fi

            if grep -q '^POSTGRES_PASSWORD=$' .env; then
              echo "Erreur : le secret POSTGRES_PASSWORD est vide."
              exit 1
            fi

            echo "=== Arrêt des anciens conteneurs ==="

            docker compose down --remove-orphans

            echo "=== Construction des images Docker ==="

            docker compose build --progress=plain

            echo "=== Démarrage des conteneurs ==="

            docker compose up -d

            echo "=== État des conteneurs ==="

            docker compose ps
