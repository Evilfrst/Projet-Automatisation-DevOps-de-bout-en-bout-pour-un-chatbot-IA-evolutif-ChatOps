name: Deploy

on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: SCP files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: "ubuntu"
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/ubuntu/chatops"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: "ubuntu"
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/chatops
            docker compose down
            docker compose up -d --build
